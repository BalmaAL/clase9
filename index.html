<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>TITULARSE</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --color-oscurisimo: #222;
                --color-oscuro: #444;
                --color-normal: #666;
                --color-iluminado: #aaa;
                --color-iluminadisimo: #ddd;
            }

            body {
                font-family: Helvetica, Arial, sans-serif;
                color: var(--color-normal);
                text-align: left;
                font-size: 100%;
            }
            div#contenedor {
                margin: 1rem auto 5rem auto;
                width: 90%;
                max-width: 720px;
            }

            h1 {
                font-weight: 400;
                font-size: calc(100% + 3vw + 3vh);
                margin-left:-0.2rem;
            }

            h2 {
                margin: 1rem 0 3rem 0;
                font-weight: 400;
                letter-spacing: 0.25rem;
                font-size: calc(100% + 1vw + 1vh);
                color: var(--color-oscuro);
            }

            canvas#myChart{
                margin:3rem 0;
                background:#eee;
                padding:1rem;
            }
        </style>
    </head>
    <body>
        <div id="contenedor">
            <h1>Título</h1>
            <h2>Subtítulo</h2>
            <p>Un breve texto que explique el origen de lo que sigue</p>
            <canvas id="myChart"></canvas>
            <p>Y otro breve texto que invite e reflexionar sobre lo que se presenta arriba.</p>
        
			<object data="viz.svg" type="image/svg+xml">
			</object>
		
		
		</div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        <script>
            new Chart(document.getElementById("myChart"), {
                type: "bar",
                data: {
                    labels: ["Pablo Nuñez G.", "Trinidad Jove", "Pamela Gatica R.", "Raul Molina O.", "Cristián Gómez M."],
                    datasets: [
                        {
                            label: "éxito",
                            data: [10, 2, 9, 1, 3],
                            borderWidth: 1,
							backgroundColor: "red"
                        },
						
						 {
                            label: "fracaso",
                            data: [4, 1, 8, 1, 7],
                            borderWidth: 1,
							backgroundColor: "blue"
                        },
                    ],
                },
                options: {
                    scales: {
                        x: { stacked: true },
						y: { stacked: true },
                    },
                },
            });
        </script>
    </body>
</html>
